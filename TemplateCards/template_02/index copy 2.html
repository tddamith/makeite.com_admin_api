<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>25th Anniversary Invitation</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style copy 2.css" />
  </head>
  <body>
    <div class="card-wrapper">
      <!-- Border Image -->
      <img
        src="https://dev-v26.s3.eu-north-1.amazonaws.com/4acbaa6c-63de-4a1f-a885-f864f00f16c0.png"
        class="flower-border"
        alt=""
      />

      <div class="invitation-card">
        <!-- Rose -->
        <img
          src="https://dev-v26.s3.eu-north-1.amazonaws.com/89e3f1e0-dcfe-40bf-8f3e-8696885d6500.png"
          class="flower-top"
          alt=""
        />

        <h1 class="couple-name editable" data-editable="names">
          Michelle & Daniel
          <span>Walker</span>
        </h1>

        <div class="ornament"></div>

        <h2 class="title editable" data-editable="title">25TH ANNIVERSARY</h2>

        <div class="date-box">
          <div class="day editable" data-editable="day">24</div>

          <div class="event-details">
            <p class="editable" data-editable="date">THURSDAY, SEPTEMBER</p>

            <p class="editable" data-editable="time">AT 8:00 PM</p>

            <p class="editable" data-editable="venue">
              500 LUXE LANE, LOS ANGELES
            </p>
          </div>
        </div>

        <p class="description editable" data-editable="description">
          JOIN US FOR AN OPULENT NIGHT HONORING 25 YEARS OF LOVE AND COMMITMENT.
        </p>

        <div class="ornament"></div>

        <p class="rsvp editable" data-editable="rsvp">
          RSVP BY 17 SEPTEMBER<br />
          WALKERS25@INVITATION.COM
        </p>
      </div>
    </div>
  </body>
</html>
